name: Deploy to Fly.io

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: fly-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Setup test database
        env:
          RAILS_ENV: test
        run: bin/rails db:prepare

      - name: Run tests
        env:
          RAILS_ENV: test
        run: bin/rails test

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --wait-timeout 300s
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          # RAILS_MASTER_KEY is usually read from config/master.key during build
          # If you prefer to pass it as a secret instead, uncomment below:
          # RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}

      - name: Deployment notification (optional)
        if: success()
        run: echo "✅ Successfully deployed to Fly.io"
