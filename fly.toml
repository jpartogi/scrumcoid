# fly.toml app configuration file for scrumcoid
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'scrumcoid'
primary_region = 'sin'
console_command = '/rails/bin/rails console'

[build]

[deploy]
  release_command = './bin/rails db:prepare'

[env]
  APP_HOST = 'scrumcoid.fly.dev'
  MAILER_FROM = 'no-reply@scrumcoid.fly.dev'
  RAILS_ENV = 'production'
  RAILS_LOG_LEVEL = 'info'
  RAILS_MAX_THREADS = '5'
  RAILS_SERVE_STATIC_FILES = 'true'

  # Critical for Thruster + Fly routing (matches nusacatering working setup)
  HTTP_PORT = '8080'
  TARGET_PORT = '3000'

  # Solid Queue runs inside the web process
  SOLID_QUEUE_IN_PUMA = 'true'

[[mounts]]
  source = 'storage'
  destination = '/rails/storage'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/up'
    protocol = 'http'
    tls_skip_verify = false

    [http_service.checks.headers]
      X-Forwarded-Proto = 'https'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
