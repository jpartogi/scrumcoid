# fly.toml app configuration file for scrumcoid
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'scrumcoid'
primary_region = 'sin'
console_command = '/rails/bin/rails console'

[build]

[deploy]
  release_command = './bin/rails db:prepare'

[env]
  APP_HOST = 'scrumcoid.fly.dev'
  MAILER_FROM = 'noreply@scrumcoid'
  RAILS_ENV = 'production'
  RAILS_LOG_LEVEL = 'debug'  # Temporarily set to debug to see why Puma isn't starting
  RAILS_MAX_THREADS = '5'
  RAILS_SERVE_STATIC_FILES = 'true'

  # These two control Thruster <-> Puma port mapping
  HTTP_PORT = '8080'   # What Thruster listens on (must match internal_port)
  PORT = '3000'        # What Puma listens on (Thruster will proxy to this)

  # Solid Queue runs inside the web process
  SOLID_QUEUE_IN_PUMA = 'true'

[[mounts]]
  source = 'storage'
  destination = '/rails/storage'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  #[http_service.concurrency]
  #  type = 'requests'
  #  hard_limit = 250
  #  soft_limit = 200

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'       # Increased timeout
    grace_period = '90s'  # Give plenty of time for first boot (migrations + Solid Queue)
    method = 'GET'
    path = '/up'
    protocol = 'http'
    tls_skip_verify = false

    [http_service.checks.headers]
      X-Forwarded-Proto = 'https'

[[vm]]
  memory = '2gb'
  cpus = 1
  memory_mb = 2048
  size = "performance-2x"
  restart_policy = "on-fail"