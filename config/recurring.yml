  # Daily cleanup of old visitor tracking data (cookie/IP fingerprints).
  # Keeps 90 days of history by default for dashboard "more stats".
  prune_old_visitor_data:
    class: PruneUniqueVisitsJob
    queue: background
    args:
      retention_days: 90
    schedule: every day at 3am

  send_meetup_follow_up_emails:
    class: SendMeetupFollowUpEmailsJob
    queue: default
    schedule: every hour

