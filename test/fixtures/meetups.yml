open_meetup:
  slug: <%= 14.days.from_now.to_date.strftime("%Y-%m-%d") %>-1
  excerpt: Free community session about Scrum practices in Indonesia.
  starts_at: <%= 14.days.from_now.change(hour: 19, min: 0) %>
  ends_at: <%= 14.days.from_now.change(hour: 21, min: 0) %>
  timezone: Asia/Jakarta
  join_link: https://zoom.us/j/123456789
  paypal_donation_url: https://www.paypal.com/donate/?hosted_button_id=TEST123
  registration_deadline: <%= 13.days.from_now %>
  capacity: 50
  status: 1
  online: true

